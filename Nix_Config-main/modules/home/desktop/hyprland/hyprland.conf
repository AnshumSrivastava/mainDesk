$mod=SUPER

# Cursor configuration
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
exec-once = import-gsettings
exec-once = random-wallpaper

bind=$mod, Q, exec, kitty
bind=$mod, C, killactive,
bind=$mod, M, exit,
bind=$mod, H, togglefloating,
bind=$mod, R, exec, eww open --toggle bar
bind=$mod, N, exec, swaync-client -t -sw

bindr=SUPER, SUPER_L, exec, rofi-runner
bind=$mod, V, exec, rofi-clipboard
bind=$mod, period, exec, rofi-emojis
bind=$mod, P, pseudo,
bind=$mod, J, togglesplit,
bind=$mod, left, movefocus, l
bind=$mod, right, movefocus, r
bind=$mod, up, movefocus, u
bind=$mod, down, movefocus, d
bind=$mod, 1, workspace, 1
bind=$mod, 2, workspace, 2
bind=$mod, 3, workspace, 3
bind=$mod, 4, workspace, 4
bind=$mod, 5, workspace, 5
bind=$mod, 6, workspace, 6
bind=$mod, 7, workspace, 7
bind=$mod, 8, workspace, 8
bind=$mod, 9, workspace, 9
bind=$mod, 0, workspace, 10
bind=$mod SHIFT, 1, movetoworkspace, 1
bind=$mod SHIFT, 2, movetoworkspace, 2
bind=$mod SHIFT, 3, movetoworkspace, 3
bind=$mod SHIFT, 4, movetoworkspace, 4
bind=$mod SHIFT, 5, movetoworkspace, 5
bind=$mod SHIFT, 6, movetoworkspace, 6
bind=$mod SHIFT, 7, movetoworkspace, 7
bind=$mod SHIFT, 8, movetoworkspace, 8
bind=$mod SHIFT, 9, movetoworkspace, 9
bind=$mod SHIFT, 0, movetoworkspace, 10

# Special Workspaces (Magic Spaces)
bind=$mod, S, togglespecialworkspace, magicS
bind=$mod SHIFT, S, movetoworkspace, special:magicS
bind=$mod, L, togglespecialworkspace, magicL
bind=$mod SHIFT, L, movetoworkspace, special:magicL

# Mouse bindings for window management
bindm=$mod, mouse:272, movewindow
bindm=$mod, mouse:273, resizewindow

# Mouse bindings for workspace scrolling
bind=$mod, mouse_down, workspace, e+1
bind=$mod, mouse_up, workspace, e-1

monitor=,preferred,auto,1

general {
    border_size = 0
    gaps_in = 2
    gaps_out = 1
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# New v0.51+ Gesture Syntax
gesture = 3, horizontal, workspace

animations {
    enabled = false
}

bind=$mod, F, fullscreen,
